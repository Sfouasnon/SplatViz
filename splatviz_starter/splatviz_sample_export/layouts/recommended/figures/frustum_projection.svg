<text x='1135' y='220' fill='#F5F7F6' font-size='28' font-family='Arial' font-weight='700'>Frustum notes</text>
<text x='1135' y='262' fill='#BBD0C4' font-size='18' font-family='Arial'>Green cameras are primary contributors.</text>
<text x='1135' y='290' fill='#BBD0C4' font-size='18' font-family='Arial'>Amber cameras are still useful overlap.</text>
<text x='1135' y='318' fill='#BBD0C4' font-size='18' font-family='Arial'>Red cameras are only removal targets when</text>
<text x='1135' y='346' fill='#BBD0C4' font-size='18' font-family='Arial'>the schedule says so.</text>
<text x='1135' y='374' fill='#BBD0C4' font-size='18' font-family='Arial'>Overlap is required for 4DGS; do not</text>
<text x='1135' y='402' fill='#BBD0C4' font-size='18' font-family='Arial'>remove cameras just because frustums</text>
<text x='1135' y='430' fill='#BBD0C4' font-size='18' font-family='Arial'>intersect.</text>
